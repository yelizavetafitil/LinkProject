<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Корпоративный портал</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007aff; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); width: 100%; max-width: 400px; text-align: center; border: 1px solid #eef0f2; }
        .hub-logo { font-weight: 800; color: var(--accent); font-size: 32px; letter-spacing: -1.5px; margin-bottom: 30px; }
        .form-control { border-radius: 14px; padding: 14px 18px; border: 1px solid #dee2e6; margin-bottom: 15px; background: #fafafa; }
        .form-control:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        .btn-login { background: var(--accent); color: white; font-weight: 700; border-radius: 14px; padding: 14px; width: 100%; border: none; transition: 0.2s; font-size: 16px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,122,255,0.25); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="hub-logo">Корпоративный портал</div>
    <div id="err" class="text-danger small mb-3 fw-bold" style="display:none;">Неверные учетные данные</div>
    <input type="text" id="u" class="form-control" placeholder="Имя пользователя">
    <input type="password" id="p" class="form-control mb-4" placeholder="Пароль">
    <button class="btn-login" onclick="login()">Войти</button>
</div>
<script>
    async function login() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        if(r.ok) location.href='/'; else document.getElementById('err').style.display='block';
    }
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
