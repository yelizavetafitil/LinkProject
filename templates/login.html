<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #144080; --accent-soft: #1f4e92; --bg: #f3f6fb; }
        body {
            background: var(--bg);
            background-image: linear-gradient(rgba(9, 23, 52, 0.58), rgba(9, 23, 52, 0.58)), url("{{ url_for('project_asset', filename='back.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(3px);
            padding: 42px 40px;
            border-radius: 30px;
            box-shadow: 0 18px 38px rgba(6, 18, 43, 0.34);
            width: 100%;
            max-width: 430px;
            text-align: center;
            border: 1px solid rgba(221, 230, 243, 0.9);
        }
        .hub-logo-img { width: 360px; max-width: 100%; height: auto; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .auth-title { color: var(--accent); font-weight: 700; font-size: 20px; margin-bottom: 6px; }
        .auth-subtitle { color: #4b5f7a; font-size: 14px; line-height: 1.5; margin-bottom: 22px; }
        .form-control { border-radius: 14px; padding: 14px 18px; border: 1px solid #dee2e6; margin-bottom: 15px; background: #fafafa; }
        .form-control:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(20,64,128,0.15); }
        .btn-login { background: var(--accent); color: white; font-weight: 700; border-radius: 14px; padding: 14px; width: 100%; border: none; transition: 0.2s; font-size: 16px; }
        .btn-login:hover { background: var(--accent-soft); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(20,64,128,0.28); }
        .btn-login:focus { box-shadow: 0 0 0 3px rgba(20,64,128,0.18); }
    </style>
</head>
<body>
<div class="login-card">
    <img class="hub-logo-img" src="{{ url_for('project_logo') }}" alt="Логотип РУП Белнипиэнергопром">
    <div class="auth-title">Авторизация</div>
    <div class="auth-subtitle">Авторизуйтесь в корпоративном портале РУП «Белнипиэнергопром», чтобы получить доступ к внутренним ресурсам.</div>
    <div id="err" class="text-danger small mb-3 fw-bold" style="display:none;">Неверные учетные данные</div>
    <input type="text" id="u" class="form-control" placeholder="Имя пользователя">
    <input type="password" id="p" class="form-control mb-4" placeholder="Пароль">
    <button class="btn-login" onclick="login()">Войти</button>
</div>
<script>
    async function login() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        if(r.ok) location.href='/'; else document.getElementById('err').style.display='block';
    }
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
