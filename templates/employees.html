<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Справочник | РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #144080; --bg: #f2f6fb; --border: #dbe5f2; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .navbar { background: white; border-bottom: 1px solid var(--border); padding: 1rem 0; }
        .content { background: white; border-radius: 20px; padding: 25px; margin-top: 30px; border: 1px solid var(--border); }
        .search-box { border-radius: 12px; padding: 12px; border: 1px solid var(--border); width: 100%; margin-bottom: 20px; }
        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14);
        }
        .brand-title { color: var(--primary); }
        .btn-link { color: var(--primary); }
        .btn-link:hover { color: #1f4e92; }
    </style>
</head>
<body>
<nav class="navbar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="btn btn-link text-decoration-none fw-bold">← К ресурсам</a>
        <h4 class="m-0 fw-bold brand-title">Справочник сотрудников РУП «Белнипиэнергопром»</h4>
        <div class="small">Всего: <span id="cnt" class="badge" style="background:#144080;">0</span></div>
    </div>
</nav>
<div class="container">
    <div class="content">
        <input type="text" id="s" class="search-box" placeholder="Поиск по имени, отделу или логину..." oninput="filter()">
        <table class="table align-middle">
            <thead><tr><th>Имя</th><th>Логин</th><th>Отдел</th><th>Почта</th></tr></thead>
            <tbody id="b"><tr><td colspan="4" class="text-center py-5">Загрузка из AD...</td></tr></tbody>
        </table>
    </div>
</div>
<script>
    let u = [];
    async function load() {
        const r = await fetch('/get_all_employees');
        u = await r.json();
        document.getElementById('cnt').innerText = u.length;
        render(u);
    }
    function render(data) {
        document.getElementById('b').innerHTML = data.map(i => `<tr><td class="fw-bold">${i.name}</td><td><code class="small">${i.login}</code></td><td class="small">${i.dept}</td><td class="small">${i.mail}</td></tr>`).join('');
    }
    function filter() {
        const q = document.getElementById('s').value.toLowerCase();
        render(u.filter(i => i.name.toLowerCase().includes(q) || i.login.toLowerCase().includes(q) || i.dept.toLowerCase().includes(q)));
    }
    window.onload = load;
</script>
</body>
</html>
