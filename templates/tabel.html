<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табель сотрудников</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="h4 mb-3">Табель сотрудников</h1>
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label">Сотрудник</label>
                    <input id="fioInput" class="form-control" list="fioHints" placeholder="Введите ФИО">
                    <datalist id="fioHints"></datalist>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Месяц</label>
                    <select id="periodSelect" class="form-select">
                        {% for p in periods %}
                        <option value="{{ p.key }}" {% if p.key == current_period %}selected{% endif %}>{{ p.label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 d-grid">
                    <button id="showBtn" class="btn btn-primary">Показать</button>
                </div>
            </div>
            <div id="resultHeader" class="mt-3 text-muted small"></div>
            <div id="daysWrap" class="row g-2 mt-1"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h2 class="h6 mb-3">Руководители</h2>
            {% for category, items in leaders.items() %}
            <div class="mb-3">
                <div class="fw-bold mb-2">{{ category }}</div>
                {% if items %}
                    {% for leader in items %}
                    <div class="border rounded p-2 mb-2 bg-white">
                        <div class="fw-semibold">{{ leader.fio }}</div>
                        <div class="small text-muted">{{ leader.info }}</div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="small text-muted">Нет данных</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
const fioInput = document.getElementById('fioInput');
const fioHints = document.getElementById('fioHints');
const periodSelect = document.getElementById('periodSelect');
const showBtn = document.getElementById('showBtn');
const resultHeader = document.getElementById('resultHeader');
const daysWrap = document.getElementById('daysWrap');

async function requestJson(url) {
    const response = await fetch(url, { cache: 'no-store' });
    let payload = null;
    try {
        payload = await response.json();
    } catch (err) {
        payload = null;
    }
    if (!response.ok) {
        const message = payload && payload.error ? payload.error : `HTTP ${response.status}`;
        throw new Error(message);
    }
    return payload;
}

let fioTimer = null;
fioInput.addEventListener('input', () => {
    if (fioTimer) clearTimeout(fioTimer);
    fioTimer = setTimeout(async () => {
        const q = fioInput.value.trim();
        if (q.length < 2) {
            fioHints.innerHTML = '';
            return;
        }
        const hints = await requestJson(`/search_fio?q=${encodeURIComponent(q)}`);
        fioHints.innerHTML = (hints || []).map((fio) => `<option value="${fio}"></option>`).join('');
    }, 180);
});

showBtn.addEventListener('click', async () => {
    const fio = fioInput.value.trim();
    const period = periodSelect.value;
    if (!fio || !period) {
        resultHeader.textContent = 'Введите ФИО и выберите месяц';
        daysWrap.innerHTML = '';
        return;
    }

    showBtn.disabled = true;
    showBtn.textContent = 'Загрузка...';
    resultHeader.textContent = 'Загрузка данных...';
    daysWrap.innerHTML = '';

    try {
        const data = await requestJson(`/status_month?fio=${encodeURIComponent(fio)}&period=${encodeURIComponent(period)}`);
        if (data.error) {
            resultHeader.textContent = 'Данные не найдены';
            return;
        }
        resultHeader.textContent = `${data.fio} | ${data.department}`;
        daysWrap.innerHTML = (data.days || []).map((d) => `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="border rounded p-2 h-100 bg-white">
                    <div class="small text-muted">День ${d.day}</div>
                    <div>${d.label}</div>
                </div>
            </div>
        `).join('');
    } catch (err) {
        resultHeader.textContent = `Ошибка запроса: ${err.message}`;
    } finally {
        showBtn.disabled = false;
        showBtn.textContent = 'Показать';
    }
});
</script>
</body>
</html>
