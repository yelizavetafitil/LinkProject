<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Администрирование | РУП Белнипиэнергопром</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1c4f9c;
            --primary-soft: #2a65c0;
            --bg: #edf3fb;
            --border: #d8e2f0;
            --text: #1c2f4b;
        }
        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% 42%, rgba(130, 230, 255, 0.18) 0%, rgba(130, 230, 255, 0) 48%),
                linear-gradient(180deg, rgba(8, 26, 72, 0.56) 0%, rgba(8, 26, 72, 0.66) 100%),
                url("{{ url_for('project_asset', filename='back4.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            padding-bottom: 50px;
        }

        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            box-shadow: 0 2px 10px rgba(20, 42, 75, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .brand-title {
            color: var(--primary);
            text-align: center;
            font-size: 16px;
            line-height: 1.2;
            margin: 0;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            flex: 1 1 auto;
        }
        .brand-domain { color: var(--primary) !important; }
        .topbar-left {
            min-width: 180px;
            display: inline-flex;
            align-items: center;
        }
        .topbar-spacer {
            min-width: 180px;
        }

        .admin-container { max-width: 1200px; margin: 24px auto; }
        .admin-hero {
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(205, 220, 243, 0.88);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 20px rgba(17, 46, 90, 0.08);
        }
        .admin-hero-title {
            margin: 0 0 6px 0;
            font-size: 18px;
            font-weight: 700;
            color: #1f4f96;
        }
        .admin-hero-subtitle {
            margin: 0;
            color: #5a7090;
            font-size: 14px;
        }
        .panel {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(205, 220, 243, 0.88);
            border-radius: 14px;
            padding: 22px;
            backdrop-filter: blur(3px);
            box-shadow: 0 8px 20px rgba(17, 46, 90, 0.08);
        }
        .groups-panel { width: 100%; }
        .categories-panel { width: 100%; }

        .section-title { font-weight: 700; font-size: 16px; margin-bottom: 0; display: flex; align-items: center; gap: 8px; color: #334155; }

        .groups-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .categories-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .create-group {
            display: flex;
            gap: 8px;
            width: min(360px, 100%);
        }
        .create-group input { min-width: 0; }
        .category-actions {
            display: grid;
            gap: 14px;
        }
        .category-row {
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(220px, 1.3fr) minmax(180px, 1fr) auto;
            align-items: center;
        }
        .category-row-inline {
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(220px, 1fr) auto;
            align-items: center;
        }
        .category-mode-box {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            display: grid;
            gap: 10px;
        }
        .category-mode-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #425a78;
            cursor: pointer;
        }
        .split-list {
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .split-item {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr);
            gap: 10px;
            align-items: center;
            border: 1px solid #e6edf8;
            border-radius: 8px;
            padding: 8px 10px;
            background: #fcfdff;
        }
        .split-item-title {
            font-size: 13px;
            color: #294565;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .category-helper {
            font-size: 12px;
            color: #6b809d;
        }
        #gList { display: grid; gap: 12px; }
        .group-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 14px 12px;
            transition: 0.2s ease;
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,252,255,0.95) 100%);
            box-shadow: 0 4px 10px rgba(17, 46, 90, 0.06);
        }
        .group-item:hover { border-color: #8fb3e6; box-shadow: 0 10px 20px rgba(17, 46, 90, 0.1); transform: translateY(-1px); }
        .group-item.active {
            border-color: var(--primary);
            background: linear-gradient(180deg, #ffffff 0%, #f4f9ff 100%);
            box-shadow: 0 0 0 3px rgba(28, 79, 156, 0.1), 0 10px 18px rgba(17, 46, 90, 0.08);
        }
        .group-title {
            min-width: 0;
            line-height: 1.35;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            min-height: 34px;
        }
        .member-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: #eef4ff;
            color: #10376f;
            border: 1px solid #cdddF4;
            border-radius: 999px;
            padding: 5px 10px;
            max-width: 100%;
        }
        .member-chip span {
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-width: 220px;
        }
        .chip-remove {
            border: none;
            background: transparent;
            color: #10376f;
            padding: 0;
            line-height: 1;
            font-size: 14px;
            cursor: pointer;
        }
        .chip-remove:hover { color: #0b2a56; }

        .ad-search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            background: #fff;
        }
        .ad-search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14);
        }
        .ad-search-box .ad-search-icon {
            flex-shrink: 0;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0;
        }
        .ad-search-box .ad-search-icon svg { display: block; }
        .ad-search-input {
            border: none !important;
            border-radius: 8px;
            padding-left: 0;
            box-shadow: none !important;
            flex: 1 1 auto;
            min-width: 0;
            background: transparent !important;
        }
        .ad-search-input:focus { box-shadow: none !important; }
        .ad-search-input:-webkit-autofill,
        .ad-search-input:-webkit-autofill:hover,
        .ad-search-input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #fff inset !important;
            box-shadow: 0 0 0 1000px #fff inset !important;
            -webkit-text-fill-color: #1e293b !important;
            transition: background-color 99999s ease-out;
        }
        .ad-results-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 10px; background: #fff; }
        .ad-entry { padding: 12px 16px; border-bottom: 1px solid #eef3f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .ad-entry > div { min-width: 0; }
        .ad-entry .fw-bold { overflow-wrap: anywhere; word-break: break-word; }
        .ad-entry:last-child { border-bottom: none; }
        .ad-entry:hover { background: #f4f8ff; }

        .badge-ad { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .user-type { background: #dcfce7; color: #166534; }
        .group-type { background: #fef3c7; color: #92400e; }

        .btn-action { border-radius: 8px; font-weight: 600; font-size: 13px; }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-soft); border-color: var(--primary-soft); }
        .btn-primary:focus { box-shadow: 0 0 0 3px rgba(28, 79, 156, 0.18); }
        .form-control, .form-select { border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 64, 128, 0.14);
        }
        .btn-link { color: var(--primary); }
        .btn-link:hover { color: var(--primary-soft); }
        .modal-content { border-radius: 12px; border: none; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .modal-header { border-bottom: 1px solid var(--border); padding: 20px 24px; }
        .modal-body { padding: 24px; }
        @media (max-width: 768px) {
            .create-group { width: 100%; }
            .groups-toolbar { align-items: stretch; }
            .category-row, .category-row-inline { grid-template-columns: 1fr; }
            .split-item { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar"><div class="container topbar px-2">
    <a href="/" class="topbar-left btn btn-link text-decoration-none fw-bold text-dark d-inline-flex align-items-center gap-2">
        <i data-lucide="chevron-left"></i> Назад к ресурсам
    </a>
    <h6 class="m-0 fw-bold brand-title">РУП «Белнипиэнергопром» — управление доступом</h6>
    <div class="topbar-spacer d-flex justify-content-end"></div>
</div></nav>

<div class="admin-container">
    <div class="admin-hero">
        <h5 class="admin-hero-title">Администрирование доступа</h5>
        <p class="admin-hero-subtitle">Создавайте группы, добавляйте участников из AD и управляйте доступом к ресурсам в одном окне.</p>
    </div>
    <div class="row g-4">
    <div class="col-12"><div class="panel groups-panel">
        <div class="groups-toolbar">
            <div class="section-title"><i data-lucide="users"></i> Группы доступа</div>
            <div class="create-group">
                <input type="text" id="gn" class="form-control form-control-sm" placeholder="Название группы">
                <button class="btn btn-primary btn-sm btn-action px-3" onclick="addG()">Создать</button>
            </div>
        </div>
        <div id="gList"></div>
    </div></div>
</div></div>

<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">Подтверждение удаления</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="confirmDeleteText" class="mb-0 text-secondary">Удалить группу?</p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="confirmDeleteOk">Удалить</button>
            </div>
        </div>
    </div>
</div>

<script>
    function renderIcons() {
        const iconPaths = {
            users: '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path>',
            search: '<circle cx="11" cy="11" r="7"></circle><line x1="16.65" y1="16.65" x2="21" y2="21"></line>',
            'trash-2': '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path>',
            'chevron-left': '<polyline points="15 18 9 12 15 6"></polyline>',
            layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline>'
        };
        document.querySelectorAll('[data-lucide]').forEach((el) => {
            const name = el.getAttribute('data-lucide');
            const svgPath = iconPaths[name];
            if (!svgPath) return;
            const size = el.getAttribute('size') || 16;
            el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgPath}</svg>`;
        });
    }
    renderIcons();
    let groupsState = [];
    let confirmDeleteModal;
    let confirmDeleteResolver = null;

    function initConfirmDeleteModal() {
        const confirmEl = document.getElementById('confirmDeleteModal');
        const confirmText = document.getElementById('confirmDeleteText');
        const confirmOk = document.getElementById('confirmDeleteOk');
        confirmDeleteModal = new bootstrap.Modal(confirmEl);
        confirmOk.addEventListener('click', () => {
            if (confirmDeleteResolver) {
                confirmDeleteResolver(true);
                confirmDeleteResolver = null;
            }
            confirmDeleteModal.hide();
        });
        confirmEl.addEventListener('hidden.bs.modal', () => {
            if (confirmDeleteResolver) {
                confirmDeleteResolver(false);
                confirmDeleteResolver = null;
            }
        });
        window.showDeleteGroupConfirm = (message) => {
            confirmText.textContent = message;
            confirmDeleteModal.show();
            return new Promise((resolve) => { confirmDeleteResolver = resolve; });
        };
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderGroups() {
        document.getElementById('gList').innerHTML = groupsState.map(g => `
            <div class="group-item active" id="card-${g.id}">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="group-title fw-bold small text-uppercase">${escapeHtml(g.name)} <small class="text-muted ms-2">${g.members.length} участников</small></span>
                    <button class="btn btn-sm text-danger p-0" onclick="delG(${g.id})"><i data-lucide="trash-2" size="16"></i></button>
                </div>
                <div class="member-list">
                    ${g.members.length
                        ? g.members.map((m, idx) => `
                            <div class="member-chip">
                                <span>${escapeHtml(m)}</span>
                                <button class="chip-remove" title="Удалить участника" onclick="removeMemberByIndex(${g.id}, ${idx})">&times;</button>
                            </div>`).join('')
                        : '<div class="small text-muted">Участники пока не добавлены.</div>'
                    }
                </div>
                <div class="ad-search-box">
                    <span class="ad-search-icon"><i data-lucide="search" size="16"></i></span>
                    <input type="text" id="adSearch-${g.id}" class="form-control ad-search-input" placeholder="Поиск в AD для этой группы..." oninput="searchAD(${g.id})">
                </div>
                <div id="adResults-${g.id}" class="ad-results-list"></div>
            </div>`).join('');
        renderIcons();
    }

    async function loadG() {
        const r = await fetch('/get_groups');
        groupsState = await r.json();
        renderGroups();
    }

    async function searchAD(groupId) {
        const q = document.getElementById(`adSearch-${groupId}`).value.trim();
        const resDiv = document.getElementById(`adResults-${groupId}`);
        if (q.length < 2) { resDiv.innerHTML = ''; return; }
        const r = await fetch(`/get_ad_entities?q=${encodeURIComponent(q)}`);
        const results = await r.json();
        resDiv.innerHTML = results.map(i => `
            <div class="ad-entry" onclick="addToGroup(${groupId}, '${encodeURIComponent(i.login.toLowerCase())}')">
                <div><div class="fw-bold small">${i.name}</div><div class="text-muted" style="font-size:11px">${i.login}</div></div>
                <span class="badge-ad ${i.type=='Юзер'?'user-type':'group-type'}">${i.type}</span>
            </div>`).join('');
    }

    async function saveMembers(groupId, members) {
        await fetch('/manage_group', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({action: 'update_members', id: groupId, members})
        });
    }

    async function addToGroup(groupId, encodedLogin) {
        const login = decodeURIComponent(encodedLogin);
        const group = groupsState.find(g => g.id === groupId);
        if (!group) return;
        if (!group.members.includes(login)) {
            group.members.push(login);
            await saveMembers(groupId, group.members);
            await loadG();
        }
        const input = document.getElementById(`adSearch-${groupId}`);
        const results = document.getElementById(`adResults-${groupId}`);
        if (input) input.value = '';
        if (results) results.innerHTML = '';
    }

    async function removeMemberByIndex(groupId, memberIdx) {
        const group = groupsState.find(g => g.id === groupId);
        if (!group) return;
        group.members = group.members.filter((_, idx) => idx !== memberIdx);
        await saveMembers(groupId, group.members);
        await loadG();
    }

    async function addG() { const n = document.getElementById('gn').value; if(!n) return; await fetch('/manage_group', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'add', name:n})}); document.getElementById('gn').value=''; loadG(); }
    async function delG(id) {
        const shouldDelete = await showDeleteGroupConfirm('Удалить группу?');
        if (!shouldDelete) return;
        await fetch('/manage_group', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'delete', id:id})});
        loadG();
    }
    window.onload = async () => {
        initConfirmDeleteModal();
        await loadG();
    };
</script>
</body>
</html>
